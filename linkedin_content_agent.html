
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .app {
    font-family: 'DM Mono', monospace;
    background: #0a0a0f;
    min-height: 100vh;
    color: #e8e8f0;
    padding: 32px 24px;
  }

  .header {
    border-left: 3px solid #00ff87;
    padding-left: 16px;
    margin-bottom: 32px;
  }

  .header-tag {
    font-size: 9px;
    letter-spacing: 3px;
    color: #00ff87;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
  }

  .header h1 span { color: #00ff87; }

  .header p {
    font-size: 11px;
    color: #5a5a72;
    margin-top: 6px;
    line-height: 1.6;
  }

  .form-block {
    background: #111118;
    border: 1px solid #1e1e2e;
    border-left: 3px solid #7c5cfc;
    padding: 24px;
    margin-bottom: 20px;
  }

  .form-row { margin-bottom: 16px; }

  .form-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #5a5a72;
    display: block;
    margin-bottom: 8px;
  }

  .form-select,
  .form-input,
  .form-textarea {
    width: 100%;
    background: #0a0a0f;
    border: 1px solid #1e1e2e;
    color: #e8e8f0;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .form-select:focus,
  .form-input:focus,
  .form-textarea:focus {
    border-color: #7c5cfc;
  }

  .form-textarea {
    resize: vertical;
    min-height: 100px;
    line-height: 1.6;
  }

  .form-select option { background: #111118; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn-generate {
    width: 100%;
    padding: 14px;
    background: #00ff87;
    color: #0a0a0f;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-generate:hover:not(:disabled) { opacity: 0.85; }
  .btn-generate:active:not(:disabled) { transform: scale(0.99); }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    font-size: 10px;
    letter-spacing: 1px;
    color: #00ff87;
    padding: 10px 0;
    text-align: center;
    min-height: 30px;
  }

  .results {
    display: none;
  }

  .results.visible { display: block; }

  .results-label {
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #5a5a72;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .results-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1e1e2e;
  }

  .post-card {
    background: #111118;
    border: 1px solid #1e1e2e;
    margin-bottom: 16px;
    position: relative;
    transition: border-color 0.2s;
  }

  .post-card:hover { border-color: #00ff87; }

  .post-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid #1e1e2e;
  }

  .post-variant {
    font-size: 9px;
    letter-spacing: 2px;
    color: #00ff87;
    text-transform: uppercase;
  }

  .btn-copy {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid #1e1e2e;
    color: #5a5a72;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-copy:hover { border-color: #00ff87; color: #00ff87; }
  .btn-copy.copied { border-color: #00ff87; color: #00ff87; }

  .post-body {
    padding: 16px;
    font-size: 12px;
    line-height: 1.85;
    color: #c0c0d4;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .post-footer {
    padding: 8px 16px;
    border-top: 1px solid #1e1e2e;
    font-size: 9px;
    color: #5a5a72;
    letter-spacing: 1px;
  }

  .error-msg {
    background: rgba(255, 107, 53, 0.08);
    border: 1px solid #ff6b35;
    border-left: 3px solid #ff6b35;
    padding: 12px 16px;
    font-size: 11px;
    color: #ff6b35;
    margin-bottom: 16px;
    display: none;
  }

  .error-msg.visible { display: block; }

  .char-count {
    font-size: 9px;
    color: #5a5a72;
    text-align: right;
    margin-top: 4px;
  }

  @media (max-width: 480px) {
    .form-grid { grid-template-columns: 1fr; }
  }
</style>

<div class="app">

  <div class="header">
    <span class="header-tag">agente linkedin · nicho técnico</span>
    <h1>Gera posts que<br><span>convertem autoridade</span></h1>
    <p>Dados técnicos → conteúdo de impacto para engenheiros e gestores industriais</p>
  </div>

  <div class="form-block">
    <div class="form-grid">
      <div class="form-row">
        <label class="form-label">Área técnica</label>
        <select class="form-select" id="area">
          <option value="manutenção industrial">Manutenção Industrial</option>
          <option value="gestão de ativos e OEE">Gestão de Ativos / OEE</option>
          <option value="automação e indústria 4.0">Automação / Indústria 4.0</option>
          <option value="engenharia de processo">Engenharia de Processo</option>
          <option value="qualidade e inspeção">Qualidade / Inspeção</option>
          <option value="CMMS e gestão de OS">CMMS / Gestão de OS</option>
          <option value="segurança industrial">Segurança Industrial</option>
          <option value="outro">Outro</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Formato preferido</label>
        <select class="form-select" id="formato">
          <option value="insight de dado + aprendizado">Dado + Aprendizado</option>
          <option value="erro cometido + lição aprendida">Erro + Lição</option>
          <option value="dica técnica prática">Dica Técnica</option>
          <option value="case de resultado real">Case de Resultado</option>
          <option value="provocação / pergunta para debate">Provocação / Debate</option>
          <option value="mito vs realidade do setor">Mito vs Realidade</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Contexto / Dado / Situação</label>
      <textarea class="form-textarea" id="contexto" placeholder="Ex: nossa planta reduziu paradas não planejadas em 34% após implementar preventiva baseada em vibração nas bombas centrífugas. Levou 6 meses e custou R$12k em sensores..."></textarea>
      <div class="char-count" id="charCount">0 / 500 chars recomendados</div>
    </div>

    <div class="form-row">
      <label class="form-label">Tom de voz</label>
      <select class="form-select" id="tom">
        <option value="técnico e direto, sem enrolação">Técnico e direto</option>
        <option value="autoridade experiente, que já errou e aprendeu">Autoridade experiente</option>
        <option value="provocador, vai contra o senso comum do setor">Provocador</option>
        <option value="didático, explica para quem está começando">Didático</option>
      </select>
    </div>

    <button class="btn-generate" id="btnGenerate" onclick="gerarPosts()">
      ⟶ Gerar 3 variações de post
    </button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="results" id="results">
    <div class="results-label">3 variações geradas</div>
    <div id="postsContainer"></div>
  </div>

</div>

<script>
  const contextoEl = document.getElementById('contexto');
  const charCount = document.getElementById('charCount');

  contextoEl.addEventListener('input', () => {
    const n = contextoEl.value.length;
    charCount.textContent = `${n} / 500 chars recomendados`;
    charCount.style.color = n > 500 ? '#ff6b35' : '#5a5a72';
  });

  async function gerarPosts() {
    const area = document.getElementById('area').value;
    const formato = document.getElementById('formato').value;
    const contexto = document.getElementById('contexto').value.trim();
    const tom = document.getElementById('tom').value;

    if (!contexto || contexto.length < 20) {
      mostrarErro('Adicione mais contexto — pelo menos descreva a situação técnica (20+ caracteres).');
      return;
    }

    const btn = document.getElementById('btnGenerate');
    const statusBar = document.getElementById('statusBar');
    const results = document.getElementById('results');
    const postsContainer = document.getElementById('postsContainer');
    const errorMsg = document.getElementById('errorMsg');

    btn.disabled = true;
    errorMsg.classList.remove('visible');
    results.classList.remove('visible');
    statusBar.textContent = '⟳ analisando contexto técnico...';

    const systemPrompt = `Você é um especialista em conteúdo LinkedIn para profissionais técnicos industriais — engenheiros, técnicos de manutenção, gestores de planta. Você cria posts que combinam autoridade técnica com impacto real.

REGRAS ABSOLUTAS:
- Nunca use linguagem de coach motivacional ou frases genéricas
- Nunca comece com "Hoje quero compartilhar" ou clichês similares
- Use linguagem técnica real do setor industrial brasileiro
- Cada post deve ter: hook forte (1-2 linhas), desenvolvimento técnico, conclusão acionável
- Hashtags no final: 3-5 tags técnicas e específicas, não genéricas
- Limite: 1200 a 1800 caracteres por post
- Tom: ${tom}
- Área: ${area}
- Formato: ${formato}

Gere EXATAMENTE 3 variações distintas. Retorne SOMENTE JSON válido, sem markdown, sem texto fora do JSON:
{"posts": [{"variacao": "Variação 1", "titulo": "titulo curto do angulo", "texto": "texto completo do post"}, {"variacao": "Variação 2", "titulo": "...", "texto": "..."}, {"variacao": "Variação 3", "titulo": "...", "texto": "..."}]}`;

    const userPrompt = `Área técnica: ${area}
Formato: ${formato}
Tom: ${tom}

Contexto/dado/situação:
${contexto}

Gere 3 variações de post LinkedIn com ângulos completamente diferentes entre si.`;

    try {
      statusBar.textContent = '⟳ gerando variações com Claude...';

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });

      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }

      const data = await response.json();
      const rawText = data.content.map(b => b.text || '').join('');

      let parsed;
      try {
        const clean = rawText.replace(/```json|```/g, '').trim();
        parsed = JSON.parse(clean);
      } catch(e) {
        throw new Error('Erro ao processar resposta. Tente novamente.');
      }

      const posts = parsed.posts || [];
      if (!posts.length) throw new Error('Nenhum post retornado. Tente novamente.');

      postsContainer.innerHTML = '';

      posts.forEach((post, i) => {
        const chars = (post.texto || '').length;
        const card = document.createElement('div');
        card.className = 'post-card';
        card.innerHTML = `
          <div class="post-card-header">
            <span class="post-variant">${post.variacao || 'Variação ' + (i+1)} · ${post.titulo || ''}</span>
            <button class="btn-copy" onclick="copiarPost(this, ${i})">copiar</button>
          </div>
          <div class="post-body" id="post-text-${i}">${escHtml(post.texto || '')}</div>
          <div class="post-footer">${chars} caracteres</div>
        `;
        postsContainer.appendChild(card);
      });

      results.classList.add('visible');
      statusBar.textContent = '✓ 3 posts gerados com sucesso';

      window._postsGerados = posts;

    } catch (err) {
      mostrarErro(err.message || 'Erro desconhecido. Verifique a conexão e tente novamente.');
      statusBar.textContent = '';
    } finally {
      btn.disabled = false;
    }
  }

  function copiarPost(btn, i) {
    const el = document.getElementById('post-text-' + i);
    if (!el) return;
    navigator.clipboard.writeText(el.textContent).then(() => {
      btn.textContent = 'copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'copiar';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function mostrarErro(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
